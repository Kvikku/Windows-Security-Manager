name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test tests/WindowsSecurityManager.Tests/WindowsSecurityManager.Tests.csproj --configuration Release --no-restore

      - name: Publish CLI executable
        run: >
          dotnet publish src/WindowsSecurityManager/WindowsSecurityManager.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish/cli

      - name: Publish GUI executable
        run: >
          dotnet publish src/WindowsSecurityManager.Gui/WindowsSecurityManager.Gui.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish/gui

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsSecurityManager-CLI-win-x64
          path: ./publish/cli/WindowsSecurityManager.exe

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsSecurityManager-GUI-win-x64
          path: ./publish/gui/

      - name: Package GUI for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: Compress-Archive -Path ./publish/gui/* -DestinationPath ./publish/WindowsSecurityManager-GUI-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./publish/cli/WindowsSecurityManager.exe
            ./publish/WindowsSecurityManager-GUI-win-x64.zip
          generate_release_notes: true
