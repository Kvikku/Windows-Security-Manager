name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test tests/WindowsSecurityManager.Tests/WindowsSecurityManager.Tests.csproj --configuration Release --no-restore

      - name: Publish self-contained executable
        run: >
          dotnet publish src/WindowsSecurityManager/WindowsSecurityManager.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsSecurityManager-win-x64
          path: ./publish/WindowsSecurityManager.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./publish/WindowsSecurityManager.exe
          generate_release_notes: true
